# SELMA Configuration — California
# Criminal Code: Cal. Penal Code (Penal Code)
# All state models include federal law (18 U.S.C.) as baseline

model:
  name: selma-california
  base: meta-llama/Llama-3.1-70B-Instruct
  description: "SELMA model for California criminal law + federal"

jurisdiction:
  name: California
  code_citation: "Cal. Penal Code"
  code_name: "Penal Code"
  includes_federal: true
  abbreviation: CA

training:
  base_config: ../../configs/training_config.yaml
  federal_data: ../../data/processed/federal_statutes.json
  state_data: training_data/california_statutes.json
  synthetic_data: training_data/synthetic_california.jsonl
  output_dir: ../../output/selma-california
