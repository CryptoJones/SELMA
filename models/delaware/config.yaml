# SELMA Configuration — Delaware
# Criminal Code: Del. Code Title 11 (Crimes and Criminal Procedure)
# All state models include federal law (18 U.S.C.) as baseline

model:
  name: selma-delaware
  base: meta-llama/Llama-3.1-70B-Instruct
  description: "SELMA model for Delaware criminal law + federal"

jurisdiction:
  name: Delaware
  code_citation: "Del. Code Title 11"
  code_name: "Crimes and Criminal Procedure"
  includes_federal: true
  abbreviation: DE

training:
  base_config: ../../configs/training_config.yaml
  federal_data: ../../data/processed/federal_statutes.json
  state_data: training_data/delaware_statutes.json
  synthetic_data: training_data/synthetic_delaware.jsonl
  output_dir: ../../output/selma-delaware
