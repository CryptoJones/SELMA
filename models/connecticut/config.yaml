# SELMA Configuration — Connecticut
# Criminal Code: Conn. Gen. Stat. Title 53a (Penal Code)
# All state models include federal law (18 U.S.C.) as baseline

model:
  name: selma-connecticut
  base: meta-llama/Llama-3.3-70B-Instruct
  description: "SELMA model for Connecticut criminal law + federal"

jurisdiction:
  name: Connecticut
  code_citation: "Conn. Gen. Stat. Title 53a"
  code_name: "Penal Code"
  includes_federal: true
  abbreviation: CT

training:
  base_config: ../../configs/training_config.yaml
  federal_data: ../../data/processed/federal_statutes.json
  state_data: training_data/connecticut_statutes.json
  synthetic_data: training_data/synthetic_connecticut.jsonl
  output_dir: ../../output/selma-connecticut
