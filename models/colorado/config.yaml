# SELMA Configuration — Colorado
# Criminal Code: C.R.S. Title 18 (Criminal Code)
# All state models include federal law (18 U.S.C.) as baseline

model:
  name: selma-colorado
  base: meta-llama/Llama-3.3-70B-Instruct
  description: "SELMA model for Colorado criminal law + federal"

jurisdiction:
  name: Colorado
  code_citation: "C.R.S. Title 18"
  code_name: "Criminal Code"
  includes_federal: true
  abbreviation: CO

training:
  base_config: ../../configs/training_config.yaml
  federal_data: ../../data/processed/federal_statutes.json
  state_data: training_data/colorado_statutes.json
  synthetic_data: training_data/synthetic_colorado.jsonl
  output_dir: ../../output/selma-colorado
