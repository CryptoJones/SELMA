# SELMA QLoRA Fine-tuning Configuration — Llama 3.1 8B
#
# Community-trainable version. Fits on a single consumer GPU:
#   - RTX 3090 / 4090 (24GB VRAM) — recommended
#   - RTX 3080 (10GB) — reduce per_device_train_batch_size to 1
#   - Google Colab free T4 (16GB) — works with batch_size=1
#   - Kaggle free P100 (16GB) — works with batch_size=1
#
# Expected training time:
#   - RTX 4090: ~2–3 hours
#   - T4 (Colab): ~6–8 hours
#   - A100-40GB: ~1 hour
#
# Usage:
#   python scripts/training/train_qlora.py --config configs/training_config_8b.yaml

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  revision: "main"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"

quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  task_type: "CAUSAL_LM"
  bias: "none"

training:
  output_dir: "./output/selma-8b-qlora"
  num_train_epochs: 3
  per_device_train_batch_size: 2       # reduce to 1 if OOM
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8       # effective batch = 16
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  eval_strategy: "steps"
  save_total_limit: 3
  bf16: true
  gradient_checkpointing: true         # required for consumer GPUs
  max_grad_norm: 1.0
  group_by_length: true
  dataloader_num_workers: 2
  report_to: "none"

data:
  train_file: "data/processed/train.jsonl"
  eval_file: "data/processed/eval.jsonl"
  max_seq_length: 2048                 # reduced from 4096 to fit in VRAM

seed: 42
